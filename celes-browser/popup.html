<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .header {
      padding: 1rem;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .badge {
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .title { font-weight: 600; font-size: 0.95rem; }
    .version { font-size: 0.75rem; opacity: 0.5; margin-left: auto; }
    .body { padding: 1rem; font-size: 0.85rem; line-height: 1.6; color: #a6adc8; }
    .body p { margin-bottom: 0.6rem; }
    code {
      background: #313244;
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
      color: #89b4fa;
    }
    .footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid #313244;
      font-size: 0.75rem;
      opacity: 0.4;
      text-align: center;
    }
    #status {
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.82rem;
      background: #313244;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #a6e3a1; flex-shrink: 0; }
    .dot.inactive { background: #585b70; }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge">Celes</span>
    <span class="title">Celes Renderer</span>
    <span class="version">v0.1.0</span>
  </div>
  <div class="body">
    <p>Automatically renders <code>.celes</code> files when you open them in the browser.</p>
    <p>Just navigate to any <code>.celes</code> file URL and it will be rendered as a styled page.</p>
    <div id="status">
      <div class="dot inactive" id="dot"></div>
      <span id="status-text">Not a .celes file</span>
    </div>
  </div>
  <div class="footer">Server-Lab Open-Control License (SOCL) 1.0</div>
  <script src="popup.js"></script>
</body>
</html>
